<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bright Future Charity</title>
</head>
  
<body>
  <h1>Bright Future Charity</h1>
  <p class="small">
    Cloud-hosted platform for event listings and volunteer registration.
  </p>

  <div class="card">
    <h2>Upcoming Events</h2>
    <ul id="eventsList">
      <li>Loading events...</li>
    </ul>
  </div>

  <div class="card">
    <h2>Volunteer Signup</h2>
    <form id="volunteerForm">
      <label for="name">Name</label>
      <input type="text" id="name" required />

      <label for="email">Email</label>
      <input type="email" id="email" required />

      <label for="phone">Phone</label>
      <input type="text" id="phone" required />

      <label for="availability">Availability</label>
      <input type="text" id="availability" placeholder="e.g. weekends, evenings" required />

      <label for="skills">Skills</label>
      <textarea id="skills" rows="4" placeholder="e.g. first aid, admin, fundraising"></textarea>

      <button type="submit">Submit Volunteer Signup</button>
    </form>

    <p id="formMessage"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      addDoc,
      query,
      orderBy
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBVLRTlUHz3m2Eu2NAVYEtzosRQpouVDIU",
      authDomain: "fine-bearing-423410-f5.firebaseapp.com",
      projectId: "fine-bearing-423410-f5",
      storageBucket: "fine-bearing-423410-f5.firebasestorage.app",
      messagingSenderId: "374701305057",
      appId: "1:374701305057:web:d0247e3cdf7adc389adba0",
      measurementId: "G-45SBMMDK4R"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadEvents() {
      const eventsList = document.getElementById("eventsList");
      eventsList.innerHTML = "<li>Loading events...</li>";

      try {
        const eventsQuery = query(collection(db, "events"), orderBy("date"));
        const snapshot = await getDocs(eventsQuery);

        eventsList.innerHTML = "";

        if (snapshot.empty) {
          eventsList.innerHTML = "<li>No events found.</li>";
          return;
        }

        snapshot.forEach((docSnap) => {
          const event = docSnap.data();
          const li = document.createElement("li");

          const title = event.title || "Untitled event";
          const date = event.date || "No date set";
          const location = event.location || "No location set";
          const capacity = event.capacity ?? "N/A";

          li.textContent = `${title} | ${date} | ${location} | Capacity: ${capacity}`;
          eventsList.appendChild(li);
        });
      } catch (error) {
        console.error("Error loading events:", error);
        eventsList.innerHTML = "<li>Could not load events.</li>";
      }
    }

    async function submitVolunteerForm(event) {
      event.preventDefault();

      const formMessage = document.getElementById("formMessage");
      formMessage.textContent = "";
      formMessage.className = "";

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const availability = document.getElementById("availability").value.trim();
      const skills = document.getElementById("skills").value.trim();

      try {
        await addDoc(collection(db, "volunteer_signups"), {
          name,
          email,
          phone,
          availability,
          skills,
          status: "new",
          createdAt: new Date().toISOString()
        });

        document.getElementById("volunteerForm").reset();
        formMessage.textContent = "Volunteer signup submitted successfully.";
        formMessage.className = "success";
      } catch (error) {
        console.error("Error submitting volunteer signup:", error);
        formMessage.textContent = "There was a problem submitting the form.";
        formMessage.className = "error";
      }
    }

    document.getElementById("volunteerForm").addEventListener("submit", submitVolunteerForm);

    loadEvents();
  </script>
</body>
</html>
